name: Analyse PPTX → slide-plans.json

on:
  push:
    paths:
      - "assets/pptx/*.pptx"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install python-pptx

      - name: Supprimer les artefacts orphelins (PPTX supprimé)
        run: python .github/scripts/cleanup_orphans.py

      - name: Analyser les nouveaux PPTXs
        run: python .github/scripts/analyze_pptx.py

      - name: Générer les fiches animateur
        run: python .github/scripts/generate_fiches.py

      - name: Générer les fiches mémo participant
        run: python .github/scripts/generate_memos.py

      - name: Commit artefacts générés si modifiés
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/slide-plans.json assets/fiches/ assets/memos/
          git diff --cached --quiet || git commit -m "feat: slide-plans.json + fiches animateur + mémos mis à jour automatiquement"
          git pull --rebase origin main
          git push
